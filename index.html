<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Viewer 3D</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #ffffff; /* sfondo bianco */
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff); // sfondo bianco

let camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.set(0, 1, 3);
camera.lookAt(0, 0, 0);

let renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// LUCI (fondamentali per vedere il modello)
const ambientLight = new THREE.AmbientLight(0xffffff, 1);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
directionalLight.position.set(5, 10, 5);
scene.add(directionalLight);

// CLOCK per animazioni
const clock = new THREE.Clock();
let mixer;

// CARICAMENTO MODELLO
const loader = new GLTFLoader();

loader.load("Nuovo1.glb?raw=true", ...)

  function (gltf) {

    const model = gltf.scene;
    scene.add(model);

    // centra automaticamente
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    // animazioni
    mixer = new THREE.AnimationMixer(model);

    if (gltf.animations.length > 0) {
      gltf.animations.forEach((clip) => {
        const action = mixer.clipAction(clip);
        action.play();
      });
    } else {
      console.warn("Nessuna animazione trovata nel file GLB");
    }

  },

  undefined,

  function (error) {
    console.error("Errore caricamento modello:", error);
  }
);

// ANIMAZIONE LOOP
function animate() {
  requestAnimationFrame(animate);

  if (mixer) {
    mixer.update(clock.getDelta());
  }

  renderer.render(scene, camera);
}

animate();

// RESIZE finestra
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
