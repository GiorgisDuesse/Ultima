<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

console.log("SCRIPT PARTITO ✔");

// SCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xcccccc);

// CAMERA
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LUCI MINIME GARANTITE
scene.add(new THREE.AmbientLight(0xffffff, 3));

// HELP VISIVO (IMPORTANTISSIMO DEBUG)
const grid = new THREE.GridHelper(10, 10);
scene.add(grid);

// LOADER
const loader = new GLTFLoader();
let mixer;
const clock = new THREE.Clock();

loader.load(
  "./Nuovo1.glb",

  function (gltf) {

    console.log("MODELLO CARICATO ✔");

    const model = gltf.scene;
    scene.add(model);

    model.position.set(0, 0, 0);

    // scala FIX (non estrema, evita sparizioni)
    model.scale.set(1, 1, 1);

    mixer = new THREE.AnimationMixer(model);

    if (gltf.animations.length === 0) {
      console.warn("NESSUNA ANIMAZIONE");
    }

    gltf.animations.forEach((clip) => {
      mixer.clipAction(clip).play();
    });

  },

  function (xhr) {
    console.log("CARICAMENTO:", (xhr.loaded / xhr.total * 100) + "%");
  },

  function (error) {
    console.error("ERRORE GLB:", error);
  }
);

// LOOP
function animate() {
  requestAnimationFrame(animate);

  if (mixer) mixer.update(clock.getDelta());

  renderer.render(scene, camera);
}

animate();

</script>
